name: GreatDeploy

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

options:
  bundleIdPrefix: com.greatdeploy
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  GreatDeploy:
    type: application
    platform: macOS
    dependencies:
      - package: GRDB
    sources:
      - path: GreatDeploy
        excludes:
          - "*.md"
          - "build"
          - "*.xcodeproj"
          - "DerivedData"
    settings:
      base:
        PRODUCT_NAME: GreatDeploy
        PRODUCT_BUNDLE_IDENTIFIER: com.greatdeploy.app
        MARKETING_VERSION: 2.0.0
        CURRENT_PROJECT_VERSION: "9"
        INFOPLIST_FILE: GreatDeploy/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Great Deploy"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024. All rights reserved."
        CODE_SIGN_ENTITLEMENTS: GreatDeploy/GreatDeploy.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(GREATDEPLOY_DEVELOPMENT_TEAM)"
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      release:
        SWIFT_COMPILATION_MODE: wholemodule

  GreatDeployTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GreatDeployTests
        excludes:
          - "VaultStoreTests.swift"
    dependencies:
      - target: GreatDeploy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.greatdeploy.app.tests
        GENERATE_INFOPLIST_FILE: YES
